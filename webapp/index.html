<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>AI Yordamchi</title>
<link rel="manifest" href="/manifest.json">
<style>
:root{
  --bg:var(--tg-theme-bg-color,#0f1923);
  --bg2:var(--tg-theme-secondary-bg-color,#1b2a3b);
  --text:var(--tg-theme-text-color,#ffffff);
  --hint:var(--tg-theme-hint-color,#7a8fa6);
  --acc:#2E86AB;
  --acc2:#1a6d8e;
  --r:14px;
  --nh:60px;
  --hh:52px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;font-size:15px;line-height:1.5}

/* ── HEADER ── */
.hdr{position:fixed;top:0;left:0;right:0;height:var(--hh);background:var(--bg2);display:flex;align-items:center;padding:0 14px;z-index:100;border-bottom:1px solid rgba(255,255,255,.07);gap:10px}
.htitle{font-size:15px;font-weight:600;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.hbadge{font-size:10px;color:var(--hint);background:rgba(255,255,255,.08);padding:2px 8px;border-radius:20px;flex-shrink:0}
.hbadge.pro{background:rgba(46,134,171,.25);color:#7ecff0}

/* ── NAV ── */
.nav{position:fixed;bottom:0;left:0;right:0;height:var(--nh);background:var(--bg2);display:flex;border-top:1px solid rgba(255,255,255,.07);z-index:100}
.nb{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;cursor:pointer;color:var(--hint);border:none;background:none;font-size:9px;padding:6px 0;transition:color .18s}
.nb.on{color:var(--acc)}
.nb svg{width:20px;height:20px}

/* ── PAGES ── */
.page{position:fixed;top:var(--hh);left:0;right:0;bottom:var(--nh);overflow-y:auto;display:none;flex-direction:column;-webkit-overflow-scrolling:touch}
.page.on{display:flex}

/* ── CHAT ── */
.chat-wrap{flex:1;overflow-y:auto;padding:10px 12px 6px;display:flex;flex-direction:column;gap:8px;scroll-behavior:smooth}
.msg-row{display:flex;align-items:flex-end;gap:8px}
.msg-row.user{flex-direction:row-reverse}
.bubble{max-width:80%;padding:10px 14px;border-radius:18px;font-size:14px;line-height:1.55;word-break:break-word}
.bubble.user{background:var(--acc);color:#fff;border-bottom-right-radius:5px}
.bubble.ai{background:var(--bg2);border-bottom-left-radius:5px;border:1px solid rgba(255,255,255,.06)}
.bubble b,.bubble strong{font-weight:600}
.bubble i,.bubble em{font-style:italic}
.bubble code{background:rgba(255,255,255,.12);padding:1px 5px;border-radius:4px;font-family:'Courier New',monospace;font-size:13px}
.bubble pre{background:rgba(0,0,0,.3);padding:10px;border-radius:8px;overflow-x:auto;font-family:'Courier New',monospace;font-size:12px;margin:6px 0}
.bubble pre code{background:none;padding:0}
.av{width:28px;height:28px;border-radius:50%;background:rgba(46,134,171,.2);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:13px}
.dots{display:inline-flex;gap:3px;padding:2px 0}
.dots span{width:5px;height:5px;background:var(--hint);border-radius:50%;animation:bn .9s infinite}
.dots span:nth-child(2){animation-delay:.2s}
.dots span:nth-child(3){animation-delay:.4s}
@keyframes bn{0%,80%,100%{transform:scale(.7);opacity:.5}40%{transform:scale(1);opacity:1}}

/* Sessiya banner */
.sess-banner{display:none;align-items:center;gap:8px;padding:6px 14px;background:rgba(46,134,171,.12);border-bottom:1px solid rgba(46,134,171,.2);font-size:12px;color:#7ecff0;flex-shrink:0}
.sess-banner.show{display:flex}
.sess-banner span{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sess-banner button{border:none;background:rgba(255,255,255,.08);color:var(--hint);cursor:pointer;font-size:11px;padding:3px 10px;border-radius:10px}

/* Chat input */
.chat-foot{padding:8px 10px;background:var(--bg2);border-top:1px solid rgba(255,255,255,.07);display:flex;gap:8px;align-items:flex-end;flex-shrink:0}
.cinp-wrap{flex:1;background:var(--bg);border:1.5px solid rgba(255,255,255,.1);border-radius:22px;display:flex;align-items:flex-end;padding:2px 4px 2px 14px;transition:border-color .2s}
.cinp-wrap:focus-within{border-color:var(--acc)}
textarea.cinp{flex:1;background:none;border:none;color:var(--text);font-size:14px;resize:none;max-height:110px;outline:none;line-height:1.45;padding:8px 0;font-family:inherit}
textarea.cinp::placeholder{color:var(--hint)}
.csnd{width:36px;height:36px;border-radius:50%;background:var(--acc);border:none;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .15s}
.csnd:hover{background:var(--acc2)}
.csnd:disabled{opacity:.4}

/* Yangi chat tugmasi */
.new-chat-wrap{padding:10px 12px 4px;flex-shrink:0}
.new-chat-btn{width:100%;padding:10px;background:rgba(46,134,171,.12);border:1.5px dashed rgba(46,134,171,.35);border-radius:12px;color:var(--acc);font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px}

/* Limit xatosi */
.limit-banner{margin:10px 12px;padding:12px 14px;background:rgba(220,80,80,.12);border:1px solid rgba(220,80,80,.25);border-radius:12px;font-size:13px;color:#f08080}
.limit-banner b{display:block;margin-bottom:4px;font-size:14px}
.limit-banner .upbtn{display:inline-block;margin-top:8px;background:var(--acc);color:#fff;border:none;padding:7px 16px;border-radius:20px;cursor:pointer;font-size:13px}

/* ── KARTA ── */
.card{background:var(--bg2);border-radius:var(--r);padding:12px 14px;display:flex;align-items:center;gap:11px;border:1px solid rgba(255,255,255,.06);cursor:pointer;transition:background .15s}
.card:active{background:rgba(255,255,255,.04)}
.ci{width:38px;height:38px;border-radius:10px;background:rgba(46,134,171,.15);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:18px}
.cinfo{flex:1;min-width:0}
.ctitle{font-size:14px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cmeta{font-size:11px;color:var(--hint);margin-top:2px}
.cdel{background:none;border:none;color:var(--hint);cursor:pointer;padding:6px;flex-shrink:0;opacity:.7}

/* ── LIST WRAP ── */
.lw{padding:10px 12px;display:flex;flex-direction:column;gap:7px}
.sec-title{font-size:11px;font-weight:600;color:var(--hint);text-transform:uppercase;letter-spacing:.05em;margin:14px 14px 6px}

/* ── FAB ── */
.fab{position:fixed;bottom:calc(var(--nh)+14px);right:14px;width:48px;height:48px;border-radius:50%;background:var(--acc);border:none;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(46,134,171,.4);z-index:50}

/* ── STATS ── */
.sw{padding:14px;display:flex;flex-direction:column;gap:10px}
.plan-card{background:var(--bg2);border-radius:var(--r);padding:16px;border:1px solid rgba(46,134,171,.3);text-align:center}
.plan-name{font-size:22px;font-weight:700;color:var(--acc)}
.plan-sub{font-size:12px;color:var(--hint);margin-top:3px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.sc{background:var(--bg2);border-radius:12px;padding:14px;text-align:center;border:1px solid rgba(255,255,255,.05)}
.sv{font-size:24px;font-weight:700;color:var(--acc)}
.sl{font-size:11px;color:var(--hint);margin-top:2px}
.lbar{height:5px;background:rgba(255,255,255,.08);border-radius:3px;overflow:hidden;margin-top:5px}
.lbf{height:100%;background:var(--acc);border-radius:3px;transition:width .5s}
.lbf.warn{background:#e0954a}
.lbf.full{background:#e05050}

/* ── SETTINGS ── */
.ss{background:var(--bg2);border-radius:var(--r);overflow:hidden;border:1px solid rgba(255,255,255,.06);margin-bottom:2px}
.sr{display:flex;align-items:center;padding:13px 14px;gap:11px;border-bottom:1px solid rgba(255,255,255,.05);cursor:pointer;transition:background .15s}
.sr:last-child{border-bottom:none}
.sr:active{background:rgba(255,255,255,.03)}
.sric{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:16px}
.srinfo{flex:1}
.srlbl{font-size:14px}
.srval{font-size:12px;color:var(--hint);margin-top:1px}
.srarr{color:var(--hint);font-size:18px;flex-shrink:0}

/* ── PERSONA CARD ── */
.pc{background:var(--bg2);border-radius:12px;padding:12px 14px;display:flex;align-items:center;gap:11px;border:1px solid rgba(255,255,255,.06);margin-bottom:7px}
.pe{width:38px;height:38px;border-radius:10px;background:rgba(46,134,171,.12);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.pi{flex:1;min-width:0}
.pn{font-size:14px;font-weight:500}
.pd{font-size:11px;color:var(--hint);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pdel{background:none;border:none;color:var(--hint);cursor:pointer;padding:6px;opacity:.7}

/* ── OBUNA ── */
.subp{background:var(--bg2);border-radius:var(--r);padding:14px;border:1px solid rgba(255,255,255,.07);display:flex;align-items:center;gap:12px;margin-bottom:8px}
.subp.cur{border-color:rgba(46,134,171,.4);background:rgba(46,134,171,.07)}
.spn{font-size:15px;font-weight:600}
.spp{font-size:12px;color:var(--hint);margin-top:2px}
.spb{background:var(--acc);color:#fff;border:none;padding:8px 14px;border-radius:20px;font-size:13px;cursor:pointer;flex-shrink:0}
.spb.cur{background:rgba(255,255,255,.08);color:var(--hint);cursor:default}
.spb.pend{background:rgba(200,150,40,.2);color:#c8a040;cursor:default}

/* ── PPT ── */
.wiz{padding:14px;display:flex;flex-direction:column;gap:13px}
.wlbl{font-size:13px;color:var(--hint);margin-bottom:4px;font-weight:500}
.winp{width:100%;background:var(--bg2);border:1.5px solid rgba(255,255,255,.1);border-radius:10px;padding:11px 13px;color:var(--text);font-size:14px;outline:none;font-family:inherit}
.winp:focus{border-color:var(--acc)}
.wrow{display:flex;gap:7px;flex-wrap:wrap}
.wchip{padding:7px 14px;border-radius:20px;background:var(--bg2);border:1.5px solid rgba(255,255,255,.1);color:var(--hint);cursor:pointer;font-size:13px;transition:all .15s}
.wchip.sel{background:var(--acc);border-color:var(--acc);color:#fff}
.pring{width:56px;height:56px;border:3px solid rgba(255,255,255,.08);border-top-color:var(--acc);border-radius:50%;animation:sp .7s linear infinite;margin:28px auto 12px}
@keyframes sp{to{transform:rotate(360deg)}}

/* ── TAB BAR ── */
.tbar{display:flex;border-bottom:1px solid rgba(255,255,255,.07);flex-shrink:0}
.tab{flex:1;padding:11px;background:none;border:none;border-bottom:2px solid transparent;color:var(--hint);font-size:13px;cursor:pointer;transition:all .18s}
.tab.on{color:var(--acc);border-bottom-color:var(--acc)}

/* ── UMUMIY ── */
.empty{text-align:center;padding:50px 20px;color:var(--hint);font-size:14px}
.btn-p{background:var(--acc);color:#fff;border:none;padding:13px;border-radius:22px;font-size:14px;cursor:pointer;font-weight:500;width:100%;font-family:inherit}
.btn-p:disabled{opacity:.5}
.btn-s{background:rgba(255,255,255,.07);color:var(--text);border:none;padding:12px;border-radius:22px;font-size:14px;cursor:pointer;width:100%;margin-top:6px;font-family:inherit}
.btn-d{background:rgba(220,50,50,.12);color:#e06060;border:none;padding:12px;border-radius:22px;font-size:14px;cursor:pointer;width:100%;margin-top:6px;font-family:inherit}
.ld{text-align:center;padding:40px;color:var(--hint)}
.spin{width:26px;height:26px;border:2px solid rgba(255,255,255,.08);border-top-color:var(--acc);border-radius:50%;animation:sp .7s linear infinite;margin:0 auto 10px}
.toast{position:fixed;bottom:calc(var(--nh)+14px);left:50%;transform:translateX(-50%);background:rgba(15,25,35,.97);color:#fff;padding:10px 18px;border-radius:22px;font-size:13px;z-index:999;white-space:nowrap;opacity:0;transition:opacity .22s;pointer-events:none;border:1px solid rgba(255,255,255,.1)}
.toast.on{opacity:1}
.mov{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;display:none;align-items:flex-end}
.mov.on{display:flex}
.modal{background:var(--bg2);border-radius:var(--r) var(--r) 0 0;padding:18px 14px 32px;width:100%;max-height:85vh;overflow-y:auto;border-top:1px solid rgba(255,255,255,.08)}
.mtitle{font-size:15px;font-weight:600;margin-bottom:14px;text-align:center}
.minp{width:100%;background:var(--bg);border:1.5px solid rgba(255,255,255,.1);border-radius:10px;padding:11px 13px;color:var(--text);font-size:14px;outline:none;margin-bottom:9px;font-family:inherit}
.minp:focus{border-color:var(--acc)}
</style>
</head>
<body>

<!-- HEADER -->
<div class="hdr">
  <div class="htitle" id="htitle">AI Yordamchi</div>
  <div class="hbadge" id="hbadge">Free</div>
</div>

<!-- ═══ CHAT PAGE ═══ -->
<div class="page on" id="pg-chat">
  <div class="sess-banner" id="sess-banner">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/></svg>
    <span id="sess-banner-title">Suhbat</span>
    <button id="sess-exit-btn">&#x2715; Chiqish</button>

  <div class="chat-wrap" id="chat-wrap"></div>
  <div class="chat-foot">
    <div class="cinp-wrap">
      <textarea class="cinp" id="cinp" placeholder="Xabar yozing..." rows="1"></textarea>
    </div>

      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
    </button>
  </div>
</div>

<!-- ═══ FAYLLAR PAGE ═══ -->
<div class="page" id="pg-files">
  <div class="tbar">
    <button class="tab on" id="ftab-s">&#x1F4AC; Suhbatlar</button>
    <button class="tab" id="ftab-p">&#x1F3A8; Prezentatsiyalar</button>
  </div>
  <div id="fcon"></div>
  <button class="fab" id="ffab" title="Yangi suhbat">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
  </button>
</div>

<!-- ═══ PPT PAGE ═══ -->
<div class="page" id="pg-ppt">
  <div id="pptv"></div>
</div>

<!-- ═══ STATS PAGE ═══ -->
<div class="page" id="pg-stats">
  <div class="sw" id="statsv"></div>
</div>

<!-- ═══ YANGILIKLAR PAGE ═══ -->
<div class="page" id="pg-news">
  <div class="lw" id="newsv"></div>
</div>

<!-- ═══ OBUNA PAGE ═══ -->
<div class="page" id="pg-sub">
  <div style="padding:14px" id="subv"></div>
</div>

<!-- ═══ SOZLAMALAR PAGE ═══ -->
<div class="page" id="pg-sett">
  <div style="padding:14px" id="settv"></div>
</div>

<!-- ═══ NAV ═══ -->
<nav class="nav">
  <button class="nb on" id="nav-chat">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>Chat
  </button>
  <button class="nb" id="nav-files">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"/></svg>Fayllar
  </button>
  <button class="nb" id="nav-ppt">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg>PPT
  </button>
  <button class="nb" id="nav-stats">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>Stats
  </button>
  <button class="nb" id="nav-news">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M4 22h16a2 2 0 002-2V4a2 2 0 00-2-2H4a2 2 0 00-2 2v16a2 2 0 002 2z"/><line x1="8" y1="6" x2="16" y2="6"/><line x1="8" y1="10" x2="16" y2="10"/></svg>Yangi
  </button>
  <button class="nb" id="nav-sub">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>Obuna
  </button>
  <button class="nb" id="nav-sett">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>Sozlama
  </button>
</nav>

<!-- ═══ MODALS ═══ -->
<div class="mov" id="mod-sess">
  <div class="modal">
    <div class="mtitle">Yangi suhbat fayli</div>
    <input class="minp" id="ns-title" placeholder="Sarlavha (ixtiyoriy)" maxlength="40">
    <button class="btn-p" id="ns-ok">Yaratish</button>
    <button class="btn-s" id="ns-cancel">Bekor</button>
  </div>
</div>

<div class="mov" id="mod-pers">
  <div class="modal">
    <div class="mtitle">Yangi model yaratish</div>
    <div style="display:flex;gap:8px">
      <input class="minp" id="np-emoji" placeholder="🤖" maxlength="2" style="width:58px;flex-shrink:0;text-align:center;font-size:20px">
      <input class="minp" id="np-name" placeholder="Model nomi" maxlength="30" style="flex:1">
    </div>
    <input class="minp" id="np-desc" placeholder="Qisqa tavsif" maxlength="60">
    <textarea class="minp" id="np-prompt" placeholder="AI ga ko'rsatma (masalan: Sen tajribali shifokorsan...)" rows="4" style="resize:none"></textarea>
    <button class="btn-p" id="np-ok">Saqlash</button>
    <button class="btn-s" id="np-cancel">Bekor</button>
  </div>
</div>

<div class="mov" id="mod-order">
  <div class="modal" id="mod-order-content"></div>
</div>

<div class="toast" id="toast"></div>

<script>
// ═══════════════════════════════════════════════════════
// GLOBAL HOLAT
// ═══════════════════════════════════════════════════════
var G = {
  api:      location.origin,
  token:    '',
  user:     {},
  bot:      {},
  isOwner:  false,
  plan:     'free',

  // Chat holati
  sessId:       null,   // null = yangi chat (asosiy xotira)
  sesTitle:     '',
  sending:      false,
  chatLoaded:   false,  // hozirgi sahifada chat yuklandimi

  // Yangiliklar
  newsPage:  0,
  newsLoad:  false,

  // Fayllar tab
  ftab: 'sessions',

  // PPT
  pptN:   5,
  pptPro: false,

  // Admin
  adminU: ''
};

// ═══════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════
document.addEventListener('DOMContentLoaded', function() { initApp(); });

async function initApp() {
  var tg = window.Telegram && window.Telegram.WebApp;
  if (tg) { tg.ready(); tg.expand(); }

  var initData = (tg && tg.initData) ? tg.initData : 'test';
  try {
    var r = await fetch(G.api + '/api/auth/verify', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ initData: initData })
    });
    var d = await r.json();
    if (!d.token) { showErr('Kirish xatosi. Telegram orqali oching.'); return; }
    G.token = d.token;
    G.user  = d.user;
  } catch(e) {
    showErr('Server bilan aloqa yo\'q');
    return;
  }

  try {
    var info = await apiFetch('/api/user/info');
    G.bot     = info;
    G.isOwner = info.isOwner;
    G.plan    = info.plan || 'free';
    document.getElementById('htitle').textContent = info.botName || 'AI Yordamchi';
    var badge = document.getElementById('hbadge');
    badge.textContent = cap(G.plan);
    if (G.plan !== 'free') badge.classList.add('pro');
  } catch(e) {}

  setupEvents();
  startFreshChat(); // Chat sahifasida doim yangi chat
}

// API

async function apiFetch(path, opts) {
  opts = opts || {};
  opts.headers = Object.assign({
    'Authorization': 'Bearer ' + G.token,
    'Content-Type':  'application/json'
  }, opts.headers || {});
  var r = await fetch(G.api + path, opts);
  if (r.status === 401) { showToast('Sessiya tugadi. Qayta oching.'); throw new Error('401'); }
  var ct = r.headers.get('content-type') || '';
  if (!ct.includes('json')) throw new Error('Server xatosi');
  var d = await r.json();
  if (d.error) throw new Error(d.error);
  return d;
}

async function loadChat() {
  var el = document.getElementById('chat-wrap');
  el.innerHTML = '<div class="ld"><div class="spin"></div></div>';

  try {
    var url = '/api/chat' + (G.sessId ? '?sessionId=' + G.sessId : '');
    var d   = await apiFetch(url);
    renderMsgs(d.messages || []);

    // Sarlavhani yangilash
    if (G.sessId && d.sessionTitle) {
      document.getElementById('htitle').textContent = d.sessionTitle;
    } else {
      document.getElementById('htitle').textContent = G.bot.botName || 'AI Yordamchi';
    }
  } catch(e) {
    if (e.message && e.message.indexOf('Limit') !== -1) {
      showLimitBanner(e.message);
    }
    el.innerHTML = '<div class="empty">Yuklanmadi</div>';
  }
}

function renderMsgs(msgs) {
  var el = document.getElementById('chat-wrap');
  el.innerHTML = '';
  if (!msgs.length) {
    el.innerHTML = '<div class="empty" style="flex:1;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:10px"><div style="font-size:36px">💬</div><div>Suhbat boshlang!</div></div>';
    return;
  }
  msgs.forEach(function(m) { addBubble(m.role, m.content, false); });
  scrollBot();
}

function addBubble(role, html, scroll) {
  var wrap = document.getElementById('chat-wrap');
  var row  = document.createElement('div');
  row.className = 'msg-row ' + (role === 'user' ? 'user' : 'ai');

  if (role !== 'user') {
    var av = document.createElement('div');
    av.className = 'av';
    av.textContent = '🤖';
    row.appendChild(av);
  }

  var bub = document.createElement('div');
  bub.className = 'bubble ' + (role === 'user' ? 'user' : 'ai');
  bub.innerHTML = fmtContent(html);

  // Vaqt
  var ts = document.createElement('div');
  ts.style.cssText = 'font-size:10px;opacity:.45;margin-top:4px;text-align:' + (role === 'user' ? 'right' : 'left');
  ts.textContent = pad(new Date().getHours()) + ':' + pad(new Date().getMinutes());
  bub.appendChild(ts);

  row.appendChild(bub);

  var emp = wrap.querySelector('.empty');
  if (emp) emp.remove();
  wrap.appendChild(row);
  if (scroll !== false) scrollBot();
  return bub;
}

function fmtContent(t) {
  if (!t) return '';
  var s = t.replace(/&lt;/g,'<').replace(/&gt;/g,'>').replace(/&amp;/g,'&');
  var ok = ['b','i','strong','em','code','pre','s','u','br'];
  s = s.replace(/<([a-zA-Z/][^>]*)>/g, function(m, tag) {
    var nm = tag.replace(/^\//, '').split(' ')[0].toLowerCase();
    return ok.indexOf(nm) !== -1 ? m : '';
  });
  return s;
}

function scrollBot() {
  var e = document.getElementById('chat-wrap');
  e.scrollTop = e.scrollHeight;
}

async function sendMsg() {
  if (G.sending) return;
  var inp  = document.getElementById('cinp');
  var text = inp.value.trim();
  if (!text) return;

  G.sending = true;
  document.getElementById('csnd').disabled = true;
  inp.value = ''; inp.style.height = 'auto';
  document.getElementById('chat-limit-area').innerHTML = '';

  addBubble('user', escH(text), true);
  var aiBub = document.createElement('div');
  aiBub.className = 'msg-row ai';
  var av2 = document.createElement('div'); av2.className = 'av'; av2.textContent = '🤖';
  var bub2 = document.createElement('div'); bub2.className = 'bubble ai';
  bub2.innerHTML = '<div class="dots"><span></span><span></span><span></span></div>';
  aiBub.appendChild(av2); aiBub.appendChild(bub2);
  document.getElementById('chat-wrap').appendChild(aiBub);
  scrollBot();

  try {
    var r = await fetch(G.api + '/api/chat', {
      method:  'POST',
      headers: { 'Authorization': 'Bearer ' + G.token, 'Content-Type': 'application/json' },
      body:    JSON.stringify({ message: text, sessionId: G.sessId || undefined })
    });

    // Limit xatosi — SSE emas, JSON
    var ct = r.headers.get('content-type') || '';
    if (ct.includes('application/json')) {
      var err = await r.json();
      bub2.remove(); av2.remove(); aiBub.remove();
      showLimitBanner(err.error || 'Limit tugadi');
      G.sending = false;
      document.getElementById('csnd').disabled = false;
      return;
    }

    var reader = r.body.getReader();
    var dec    = new TextDecoder();
    var aiText = '';
    bub2.innerHTML = '';

    while (true) {
      var res = await reader.read();
      if (res.done) break;
      var lines = dec.decode(res.value).split('\n');
      for (var i = 0; i < lines.length; i++) {
        var line = lines[i];
        if (!line.startsWith('data:')) continue;
        try {
          var ev = JSON.parse(line.slice(5));
          if (ev.text) {
            aiText += ev.text;
            bub2.innerHTML = fmtContent(aiText);
            scrollBot();
          }
          if (ev.message && ev.message.indexOf && ev.message.indexOf('limit') !== -1) {
            bub2.innerHTML = '<i style="color:var(--hint)">' + escH(ev.message) + '</i>';
          }
        } catch(_) {}
      }
    }
    // Vaqt qo'shamiz
    var ts2 = document.createElement('div');
    ts2.style.cssText = 'font-size:10px;opacity:.45;margin-top:4px;text-align:left';
    ts2.textContent = pad(new Date().getHours()) + ':' + pad(new Date().getMinutes());
    bub2.appendChild(ts2);

  } catch(e) {
    bub2.innerHTML = '<i style="color:var(--hint)">Xato yuz berdi. Qayta urining.</i>';
  }

  G.sending = false;
  document.getElementById('csnd').disabled = false;
  inp.focus();
}

function showLimitBanner(msg) {
  var el = document.getElementById('chat-limit-area');
  el.innerHTML = '';
  var div = document.createElement('div');
  div.className = 'limit-banner';
  div.innerHTML = '<b>⚠️ Limit tugadi</b>' + escH(msg) +
    '<br><button class="upbtn" id="go-sub-btn">⭐ Obunani yangilash</button>';
  el.appendChild(div);
  document.getElementById('go-sub-btn').addEventListener('click', function() {
    showPage('sub');
  });
}

async function loadFilesContent() {
  var el = document.getElementById('fcon');
  el.innerHTML = '<div class="ld"><div class="spin"></div></div>';

  if (G.ftab === 'sessions') {
    try {
      var d    = await apiFetch('/api/sessions');
      var list = d.sessions || [];
      el.innerHTML = '';
      if (!list.length) {
        el.innerHTML = '<div class="empty">Suhbat fayli yo\'q.<br><small>Chat qismida yozishni boshlang.</small></div>';
        return;
      }
      var lw = document.createElement('div'); lw.className = 'lw';
      list.forEach(function(s) {
        var cnt = Math.floor((s.messages || []).length / 2);
        var dt  = new Date(s.updatedAt).toLocaleDateString('ru-RU');
        var isA = G.sessId === String(s._id);

        var row = mkCard('💬', (isA ? '▶ ' : '') + s.title, cnt + ' savol-javob · ' + dt);
        if (isA) row.style.borderColor = 'rgba(46,134,171,.4)';

        var del = document.createElement('button'); del.className = 'cdel';
        del.innerHTML = '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/></svg>';
        del.addEventListener('click', function(e) { e.stopPropagation(); delSess(String(s._id)); });
        row.appendChild(del);

        row.addEventListener('click', function(e) {
          if (e.target === del || del.contains(e.target)) return;
          openSessInChat(String(s._id), s.title);
        });
        lw.appendChild(row);
      });
      el.appendChild(lw);
    } catch(e) { el.innerHTML = '<div class="empty">Yuklanmadi</div>'; }

  } else {
    try {
      var d2   = await apiFetch('/api/ppt');
      var list2 = d2.ppts || [];
      el.innerHTML = '';
      if (!list2.length) {
        el.innerHTML = '<div class="empty">Prezentatsiya yo\'q.<br><small>PPT bo\'limida yarating.</small></div>';
        return;
      }
      var lw2 = document.createElement('div'); lw2.className = 'lw';
      list2.forEach(function(p) {
        var dt  = new Date(p.createdAt).toLocaleDateString('ru-RU');
        var row = mkCard('🎨', (p.isPro ? '⭐ ' : '') + p.topic, p.slideCount + ' slayd · ' + dt);
        var del = document.createElement('button'); del.className = 'cdel';
        del.innerHTML = '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/></svg>';
        del.addEventListener('click', function(e) { e.stopPropagation(); delPpt(String(p._id)); });
        row.appendChild(del);
        lw2.appendChild(row);
      });
      el.appendChild(lw2);
    } catch(e) { el.innerHTML = '<div class="empty">Yuklanmadi</div>'; }
  }
}

function mkCard(icon, title, meta) {
  var row  = document.createElement('div'); row.className = 'card';
  var ci   = document.createElement('div'); ci.className = 'ci'; ci.textContent = icon;
  var info = document.createElement('div'); info.className = 'cinfo';
  var t    = document.createElement('div'); t.className = 'ctitle'; t.textContent = title;
  var m    = document.createElement('div'); m.className = 'cmeta';  m.textContent = meta;
  info.appendChild(t); info.appendChild(m);
  row.appendChild(ci); row.appendChild(info);
  return row;
}

  try {
    var r = await fetch(G.api + '/api/ppt', {
      method:  'POST',
      headers: { 'Authorization': 'Bearer ' + G.token, 'Content-Type': 'application/json' },
      body:    JSON.stringify({ topic: topic, slideCount: G.pptN, isPro: G.pptPro, description: desc, theme: theme })
    });

    // Limit xatosi
    var ct = r.headers.get('content-type') || '';
    if (ct.includes('application/json')) {
      var err = await r.json();
      el.innerHTML = '';
      var lb = document.createElement('div'); lb.className = 'limit-banner';

        '<br><button class="upbtn" id="ppt-sub-btn">⭐ Obunani yangilash</button>';
      el.appendChild(lb);
      document.getElementById('ppt-sub-btn').addEventListener('click', function() { showPage('sub'); });
      return;
    }

    var reader = r.body.getReader(), dec = new TextDecoder(), result = null;
    while (true) {
      var res = await reader.read(); if (res.done) break;
      var lines = dec.decode(res.value).split('\n');
      for (var i = 0; i < lines.length; i++) {
        if (!lines[i].startsWith('data:')) continue;
        try {
          var ev = JSON.parse(lines[i].slice(5));
          if (ev.message) { var pm = document.getElementById('pmsg'); if (pm) pm.textContent = ev.message; }
          if (ev.error)   { showToast(ev.message || 'Xato'); loadPptList(); return; }
          if (ev.base64)  { result = ev; }
        } catch(_) {}
      }
    }

    if (result) {
      var blob = b64Blob(result.base64, 'application/vnd.openxmlformats-officedocument.presentationml.presentation');
      var url  = URL.createObjectURL(blob);
      var a    = document.createElement('a');
      a.href = url; a.download = result.fileName || 'presentation.pptx';
      document.body.appendChild(a); a.click();
      document.body.removeChild(a); URL.revokeObjectURL(url);
      showToast('✅ Yuklab olindi!', 3000);
      loadPptList();
    }
  } catch(e) { showToast('Xato: ' + e.message); loadPptList(); }
}

function b64Blob(b64, type) {
  var bin = atob(b64), arr = new Uint8Array(bin.length);
  for (var i = 0; i < bin.length; i++) arr[i] = bin.charCodeAt(i);
  return new Blob([arr], { type: type });
}

    var t3 = document.createElement('div'); t3.className = 'sec-title'; t3.style.marginTop = '14px'; t3.textContent = '⚠️ Xavfli zona';
    el.appendChild(t3);
    var clrBtn = document.createElement('button'); clrBtn.className = 'btn-d';
    clrBtn.textContent = '🗑 Asosiy xotirani tozalash';
    clrBtn.addEventListener('click', clearMem); el.appendChild(clrBtn);

    var bk = document.createElement('button'); bk.className = 'btn-s'; bk.style.marginTop = '12px';
    bk.textContent = '◀ Orqaga'; bk.addEventListener('click', loadSett); el.appendChild(bk);
  } catch(e) { el.innerHTML = '<div class="empty">Yuklanmadi</div>'; }
}

async function doCreatePersona() {
  var emoji  = (document.getElementById('np-emoji').value.trim() || '🤖');
  var name   = document.getElementById('np-name').value.trim();
  var desc   = document.getElementById('np-desc').value.trim();
  var prompt = document.getElementById('np-prompt').value.trim();
  if (!name || !prompt) { showToast('Nom va prompt kerak'); return; }
  try {
    await apiFetch('/api/settings/personas', { method:'POST', body: JSON.stringify({ name, emoji, description: desc, systemPrompt: prompt }) });
    closeModal('mod-pers');
    ['np-emoji','np-name','np-desc','np-prompt'].forEach(function(id) { document.getElementById(id).value = ''; });
    showToast('Model yaratildi ✅');
    showSettIface();
  } catch(e) { showToast(e.message); }
}

async function delPersona(id) {
  if (!confirm('O\'chirasizmi?')) return;
  try { await apiFetch('/api/settings/personas/' + id, { method: 'DELETE' }); showToast('O\'chirildi'); showSettIface(); }
  catch(e) { showToast('Xato'); }
}

async function addBuiltin(key) {
  try { await apiFetch('/api/settings/personas', { method:'POST', body: JSON.stringify({ builtinKey: key }) }); showToast('Qo\'shildi ✅'); showSettIface(); }
  catch(e) { showToast(e.message); }
}

async function clearMem() {
  if (!confirm('Asosiy xotirani tozalash. Bu amalni qaytarib bo\'lmaydi!')) return;
  try { await apiFetch('/api/settings/clear', { method:'POST' }); showToast('Tozalandi ✅'); }
  catch(e) { showToast('Xato'); }
}

function mkSettRow(icon, bg, lbl, val) {
  var row  = document.createElement('div'); row.className = 'sr';
  var ic   = document.createElement('div'); ic.className = 'sric'; ic.style.background = bg; ic.textContent = icon;
  var inf  = document.createElement('div'); inf.className = 'srinfo';
  var lb   = document.createElement('div'); lb.className = 'srlbl'; lb.textContent = lbl;
  var vl   = document.createElement('div'); vl.className = 'srval'; vl.textContent = val;
  var arr  = document.createElement('div'); arr.className = 'srarr'; arr.textContent = '›';
  inf.appendChild(lb); inf.appendChild(vl);
  row.appendChild(ic); row.appendChild(inf); row.appendChild(arr);
  return row;
}

function showToast(msg, dur) {
  var e = document.getElementById('toast');
  e.textContent = msg; e.classList.add('on');
  setTimeout(function() { e.classList.remove('on'); }, dur || 2400);
}

function showErr(msg) {
  document.body.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100vh;text-align:center;padding:20px;color:var(--hint)"><div><div style="font-size:40px;margin-bottom:14px">⚠️</div>' + escH(msg) + '</div></div>';
}

function escH(t) {
  return String(t || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function copyTxt(t) {
  if (navigator.clipboard) navigator.clipboard.writeText(t);
  showToast('Nusxalandi ✅');
}

function cap(s) { return s ? s.charAt(0).toUpperCase() + s.slice(1) : ''; }
function pad(n) { return String(n).padStart(2, '0'); }

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js').catch(function() {});
}
