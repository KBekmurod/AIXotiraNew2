<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>AI Yordamchi</title>
<link rel="manifest" href="/manifest.json">
<style>
:root{--bg:var(--tg-theme-bg-color,#0f1923);--bg2:var(--tg-theme-secondary-bg-color,#1a2633);--text:var(--tg-theme-text-color,#fff);--hint:var(--tg-theme-hint-color,#8899aa);--acc:#2E86AB;--r:14px;--nh:62px;--hh:54px}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:15px}
.hdr{position:fixed;top:0;left:0;right:0;height:var(--hh);background:var(--bg2);display:flex;align-items:center;padding:0 16px;z-index:100;border-bottom:1px solid rgba(255,255,255,.06);gap:10px}
.htitle{font-size:16px;font-weight:600;flex:1}
.hplan{font-size:11px;color:var(--hint);background:rgba(255,255,255,.08);padding:3px 9px;border-radius:20px}
.nav{position:fixed;bottom:0;left:0;right:0;height:var(--nh);background:var(--bg2);display:flex;border-top:1px solid rgba(255,255,255,.06);z-index:100}
.nb{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;cursor:pointer;color:var(--hint);border:none;background:none;font-size:9px;padding:5px 0;transition:color .18s}
.nb.on{color:var(--acc)}
.nb svg{width:21px;height:21px}
.page{position:fixed;top:var(--hh);left:0;right:0;bottom:var(--nh);overflow-y:auto;display:none;flex-direction:column}
.page.on{display:flex}
.cmsg{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:10px}
.msg{max-width:84%;padding:10px 13px;border-radius:var(--r);line-height:1.55;word-break:break-word;font-size:14px}
.msg b,.msg strong{font-weight:600}.msg i{font-style:italic}
.msg code{background:rgba(255,255,255,.12);padding:1px 5px;border-radius:4px;font-family:monospace;font-size:13px}
.msg pre{background:rgba(0,0,0,.35);padding:10px;border-radius:10px;overflow-x:auto;font-family:monospace;font-size:12px;margin:6px 0}
.mu{background:var(--acc);color:#fff;align-self:flex-end;border-bottom-right-radius:4px}
.ma{background:var(--bg2);align-self:flex-start;border-bottom-left-radius:4px}
.dots{display:inline-flex;gap:3px;padding:4px 0}
.dots span{width:6px;height:6px;background:var(--hint);border-radius:50%;animation:bn .9s infinite}
.dots span:nth-child(2){animation-delay:.15s}.dots span:nth-child(3){animation-delay:.3s}
@keyframes bn{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-6px)}}
.sbar{display:flex;align-items:center;gap:8px;padding:7px 12px;background:rgba(46,134,171,.1);border-bottom:1px solid rgba(46,134,171,.18);font-size:12px;color:var(--acc);flex-shrink:0}
.sbar span{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sbar button{background:rgba(255,255,255,.07);border:none;color:var(--hint);cursor:pointer;font-size:11px;padding:3px 8px;border-radius:6px}
.cfoot{padding:8px 12px;background:var(--bg2);border-top:1px solid rgba(255,255,255,.06);display:flex;gap:8px;align-items:flex-end;flex-shrink:0}
.cinp{flex:1;background:var(--bg);border:1px solid rgba(255,255,255,.1);border-radius:22px;padding:10px 16px;color:var(--text);font-size:14px;resize:none;max-height:120px;outline:none;line-height:1.4}
.cinp::placeholder{color:var(--hint)}
.csnd{width:40px;height:40px;border-radius:50%;background:var(--acc);border:none;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.csnd:disabled{opacity:.4}
.lw{padding:12px;display:flex;flex-direction:column;gap:8px}
.card{background:var(--bg2);border-radius:var(--r);padding:13px 15px;display:flex;align-items:center;gap:12px;border:1px solid rgba(255,255,255,.05)}
.ci{width:38px;height:38px;border-radius:10px;background:rgba(46,134,171,.18);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:18px}
.cinfo{flex:1;min-width:0}
.ctitle{font-size:14px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cmeta{font-size:11px;color:var(--hint);margin-top:2px}
.cdel{background:none;border:none;color:var(--hint);cursor:pointer;padding:6px;flex-shrink:0}
.fab{position:fixed;bottom:calc(var(--nh)+14px);right:16px;width:50px;height:50px;border-radius:50%;background:var(--acc);border:none;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 18px rgba(46,134,171,.45);z-index:50}
.sw{padding:16px;display:flex;flex-direction:column;gap:12px}
.planc{background:var(--bg2);border-radius:var(--r);padding:18px;border:1px solid rgba(46,134,171,.25);text-align:center}
.plann{font-size:24px;font-weight:700;color:var(--acc)}.plans{font-size:12px;color:var(--hint);margin-top:4px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.sc{background:var(--bg2);border-radius:var(--r);padding:14px;text-align:center;border:1px solid rgba(255,255,255,.05)}
.sv{font-size:26px;font-weight:700;color:var(--acc)}.sl{font-size:11px;color:var(--hint);margin-top:3px}
.lb{height:4px;background:rgba(255,255,255,.1);border-radius:2px;overflow:hidden;margin-top:4px}
.lbf{height:100%;background:var(--acc);border-radius:2px}
.ss{background:var(--bg2);border-radius:var(--r);overflow:hidden;border:1px solid rgba(255,255,255,.05);margin-bottom:10px}
.sr{display:flex;align-items:center;padding:13px 16px;gap:12px;border-bottom:1px solid rgba(255,255,255,.05);cursor:pointer}
.sr:last-child{border-bottom:none}
.sric{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:17px}
.srinfo{flex:1}.srlbl{font-size:14px}.srval{font-size:12px;color:var(--hint);margin-top:2px}
.stitle{font-size:12px;color:var(--hint);font-weight:600;text-transform:uppercase;letter-spacing:.04em;margin:14px 4px 6px}
.subp{background:var(--bg2);border-radius:var(--r);padding:14px 16px;border:1px solid rgba(255,255,255,.07);display:flex;align-items:center;gap:12px;margin-bottom:8px}
.subp.cur{border-color:rgba(46,134,171,.4);background:rgba(46,134,171,.08)}
.spn{font-size:15px;font-weight:600}.spp{font-size:12px;color:var(--hint);margin-top:2px}
.spb{background:var(--acc);color:#fff;border:none;padding:8px 14px;border-radius:20px;font-size:13px;cursor:pointer}
.spb.cur{background:rgba(255,255,255,.08);color:var(--hint);cursor:default}
.wiz{padding:16px;display:flex;flex-direction:column;gap:14px}
.wlbl{font-size:13px;color:var(--hint);margin-bottom:4px}
.winp{width:100%;background:var(--bg2);border:1px solid rgba(255,255,255,.1);border-radius:10px;padding:12px 14px;color:var(--text);font-size:14px;outline:none}
.winp:focus{border-color:var(--acc)}
.wrow{display:flex;gap:8px;flex-wrap:wrap}
.wchip{padding:7px 14px;border-radius:20px;background:var(--bg2);border:1px solid rgba(255,255,255,.1);color:var(--text);cursor:pointer;font-size:13px}
.wchip.sel{background:var(--acc);border-color:var(--acc);color:#fff}
.pring{width:60px;height:60px;border:3px solid rgba(255,255,255,.1);border-top-color:var(--acc);border-radius:50%;animation:sp .7s linear infinite;margin:30px auto 12px}
@keyframes sp{to{transform:rotate(360deg)}}
.pc{background:var(--bg2);border-radius:var(--r);padding:13px 15px;display:flex;align-items:center;gap:12px;border:1px solid rgba(255,255,255,.05);margin-bottom:8px}
.pe{width:38px;height:38px;border-radius:10px;background:rgba(46,134,171,.15);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.pi{flex:1;min-width:0}.pn{font-size:14px;font-weight:500}.pd{font-size:11px;color:var(--hint);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pdel{background:none;border:none;color:var(--hint);cursor:pointer;padding:6px}
.empty{text-align:center;padding:60px 20px;color:var(--hint);font-size:14px}
.bp{background:var(--acc);color:#fff;border:none;padding:13px 20px;border-radius:22px;font-size:14px;cursor:pointer;font-weight:500;width:100%}
.bs{background:rgba(255,255,255,.07);color:var(--text);border:none;padding:12px 20px;border-radius:22px;font-size:14px;cursor:pointer;width:100%;margin-top:6px}
.bd{background:rgba(230,50,50,.15);color:#e05050;border:none;padding:12px 20px;border-radius:22px;font-size:14px;cursor:pointer;width:100%;margin-top:6px}
.ld{text-align:center;padding:40px;color:var(--hint)}
.spin{width:28px;height:28px;border:2px solid rgba(255,255,255,.1);border-top-color:var(--acc);border-radius:50%;animation:sp .7s linear infinite;margin:0 auto 10px}
.toast{position:fixed;bottom:calc(var(--nh)+16px);left:50%;transform:translateX(-50%);background:rgba(20,35,50,.97);color:#fff;padding:10px 18px;border-radius:22px;font-size:13px;z-index:999;white-space:nowrap;opacity:0;transition:opacity .22s;pointer-events:none}
.toast.on{opacity:1}
.mov{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:200;display:none;align-items:flex-end}
.mov.on{display:flex}
.modal{background:var(--bg2);border-radius:var(--r) var(--r) 0 0;padding:20px 16px 32px;width:100%;max-height:82vh;overflow-y:auto}
.mtitle{font-size:16px;font-weight:600;margin-bottom:16px;text-align:center}
.minp{width:100%;background:var(--bg);border:1px solid rgba(255,255,255,.12);border-radius:10px;padding:12px 14px;color:var(--text);font-size:14px;outline:none;margin-bottom:10px}
.minp:focus{border-color:var(--acc)}
.tbar{display:flex;border-bottom:1px solid rgba(255,255,255,.07)}
.tab{flex:1;padding:12px;background:none;border:none;border-bottom:2px solid transparent;color:var(--hint);font-size:13px;cursor:pointer}
.tab.on{color:var(--acc);border-bottom-color:var(--acc)}
</style>
</head>
<body>

<div class="hdr">
  <div class="htitle" id="htitle">AI Yordamchi</div>
  <div class="hplan" id="hplan">Free</div>
</div>

<div class="page on" id="pg-chat">
  <div class="sbar" id="sbar" style="display:none">
    <span id="sbartitle">Suhbat</span>
    <button id="sbarexit">&#x2715;</button>
  </div>
  <div class="cmsg" id="cmsg"></div>
  <div class="cfoot">
    <textarea class="cinp" id="cinp" placeholder="Xabar yozing..." rows="1"></textarea>
    <button class="csnd" id="csnd">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
    </button>
  </div>
</div>

<div class="page" id="pg-files">
  <div class="tbar">
    <button class="tab on" id="ftab-s">&#x1F4AC; Suhbatlar</button>
    <button class="tab" id="ftab-p">&#x1F3A8; PPT fayllar</button>
  </div>
  <div id="fcon"></div>
  <button class="fab" id="ffab">&#xFF0B;</button>
</div>

<div class="page" id="pg-ppt">
  <div id="pptv"></div>
</div>

<div class="page" id="pg-stats">
  <div class="sw" id="statsv"></div>
</div>

<div class="page" id="pg-news">
  <div class="lw" id="newsv"></div>
</div>

<div class="page" id="pg-sub">
  <div style="padding:16px" id="subv"></div>
</div>

<div class="page" id="pg-sett">
  <div style="padding:16px" id="settv"></div>
</div>

<nav class="nav">
  <button class="nb on" id="nav-chat"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>Chat</button>
  <button class="nb" id="nav-files"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"/></svg>Fayllar</button>
  <button class="nb" id="nav-ppt"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg>PPT</button>
  <button class="nb" id="nav-stats"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>Stats</button>
  <button class="nb" id="nav-news"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M4 22h16a2 2 0 002-2V4a2 2 0 00-2-2H4a2 2 0 00-2 2v16a2 2 0 002 2z"/><line x1="8" y1="6" x2="16" y2="6"/><line x1="8" y1="10" x2="16" y2="10"/></svg>Yangi</button>
  <button class="nb" id="nav-sub"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>Obuna</button>
  <button class="nb" id="nav-sett"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>Sozlama</button>
</nav>

<div class="mov" id="mod-sess">
  <div class="modal">
    <div class="mtitle">Yangi suhbat fayli</div>
    <input class="minp" id="ns-title" placeholder="Sarlavha (ixtiyoriy)" maxlength="40">
    <button class="bp" id="ns-ok">Yaratish</button>
    <button class="bs" id="ns-cancel">Bekor</button>
  </div>
</div>

<div class="mov" id="mod-pers">
  <div class="modal">
    <div class="mtitle">Yangi model</div>
    <div style="display:flex;gap:8px">
      <input class="minp" id="np-emoji" placeholder="&#x1F916;" maxlength="2" style="width:60px;flex-shrink:0">
      <input class="minp" id="np-name" placeholder="Nom" maxlength="30" style="flex:1">
    </div>
    <input class="minp" id="np-desc" placeholder="Qisqa tavsif" maxlength="60">
    <textarea class="minp" id="np-prompt" placeholder="AI ga ko'rsatma..." rows="4" style="resize:none"></textarea>
    <button class="bp" id="np-ok">Saqlash</button>
    <button class="bs" id="np-cancel">Bekor</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ═══ GLOBAL ═══
var G = {
  api: location.origin,
  token: '', user: {}, bot: {},
  isOwner: false,
  sessId: null, sesTitle: '',
  sending: false,
  newsPage: 0, newsLoad: false,
  ftab: 'sessions',
  pptN: 5, pptPro: false,
  adminU: '',
  settBot: null
};

// ═══ INIT ═══
document.addEventListener('DOMContentLoaded', function() {
  initApp();
});

async function initApp() {
  var tg = window.Telegram && window.Telegram.WebApp;
  if (tg) { tg.ready(); tg.expand(); }

  var initData = (tg && tg.initData) ? tg.initData : 'test';

  try {
    var r = await fetch(G.api + '/api/auth/verify', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ initData: initData })
    });
    var d = await r.json();
    if (!d.token) { showErr('Kirish xatosi'); return; }
    G.token = d.token;
    G.user  = d.user;
  } catch(e) {
    showErr('Server bilan aloqa yo\'q');
    return;
  }

  try {
    var info = await apiFetch('/api/user/info');
    G.bot = info;
    G.isOwner = info.isOwner;
    document.getElementById('htitle').textContent = info.botName || 'AI Yordamchi';
    document.getElementById('hplan').textContent  = cap(info.plan || 'free');
  } catch(e) {}

  setupEvents();
  loadChat();
}

// ═══ EVENT SETUP (onclick o'rniga addEventListener) ═══
function setupEvents() {
  // NAV
  document.getElementById('nav-chat').addEventListener('click',  function() { showPage('chat'); });
  document.getElementById('nav-files').addEventListener('click', function() { showPage('files'); });
  document.getElementById('nav-ppt').addEventListener('click',   function() { showPage('ppt'); });
  document.getElementById('nav-stats').addEventListener('click', function() { showPage('stats'); });
  document.getElementById('nav-news').addEventListener('click',  function() { showPage('news'); });
  document.getElementById('nav-sub').addEventListener('click',   function() { showPage('sub'); });
  document.getElementById('nav-sett').addEventListener('click',  function() { showPage('sett'); });

  // CHAT
  document.getElementById('csnd').addEventListener('click', sendMsg);
  document.getElementById('sbarexit').addEventListener('click', exitSess);
  var inp = document.getElementById('cinp');
  inp.addEventListener('input', function() {
    this.style.height = 'auto';
    this.style.height = Math.min(this.scrollHeight, 120) + 'px';
  });
  inp.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMsg(); }
  });

  // FAYLLAR tabs
  document.getElementById('ftab-s').addEventListener('click', function() { switchFTab('sessions'); });
  document.getElementById('ftab-p').addEventListener('click', function() { switchFTab('ppts'); });
  document.getElementById('ffab').addEventListener('click', function() { openModal('mod-sess'); });

  // MODAL session
  document.getElementById('ns-ok').addEventListener('click',     doCreateSess);
  document.getElementById('ns-cancel').addEventListener('click', function() { closeModal('mod-sess'); });
  document.getElementById('mod-sess').addEventListener('click',  function(e) { if (e.target === this) closeModal('mod-sess'); });

  // MODAL persona
  document.getElementById('np-ok').addEventListener('click',     doCreatePersona);
  document.getElementById('np-cancel').addEventListener('click', function() { closeModal('mod-pers'); });
  document.getElementById('mod-pers').addEventListener('click',  function(e) { if (e.target === this) closeModal('mod-pers'); });
}

// ═══ NAVIGATSIYA ═══
function showPage(name) {
  document.querySelectorAll('.page').forEach(function(p) { p.classList.remove('on'); });
  document.querySelectorAll('.nb').forEach(function(b)   { b.classList.remove('on'); });
  document.getElementById('pg-' + name).classList.add('on');
  var nb = document.getElementById('nav-' + name);
  if (nb) nb.classList.add('on');

  if (name === 'files') { loadFiles(); }
  if (name === 'ppt')   { loadPptList(); }
  if (name === 'stats') { loadStats(); }
  if (name === 'news')  { G.newsPage = 0; G.newsLoad = false; loadNews(); }
  if (name === 'sub')   { loadSub(); }
  if (name === 'sett')  { loadSett(); }
}

// ═══ API ═══
async function apiFetch(path, opts) {
  opts = opts || {};
  opts.headers = Object.assign({
    'Authorization': 'Bearer ' + G.token,
    'Content-Type':  'application/json'
  }, opts.headers || {});
  var r = await fetch(G.api + path, opts);
  if (r.status === 401) { showToast('Sessiya tugadi'); throw new Error('401'); }
  var d = await r.json();
  if (d.error) throw new Error(d.error);
  return d;
}

// ═══ CHAT ═══
async function loadChat() {
  var el = document.getElementById('cmsg');
  el.innerHTML = '<div class="ld"><div class="spin"></div></div>';
  try {
    var url = '/api/chat' + (G.sessId ? '?sessionId=' + G.sessId : '');
    var d   = await apiFetch(url);
    renderMsgs(d.messages || []);
  } catch(e) {
    el.innerHTML = '<div class="empty">Yuklanmadi</div>';
  }
}

function renderMsgs(msgs) {
  var el = document.getElementById('cmsg');
  el.innerHTML = '';
  if (!msgs.length) {
    el.innerHTML = '<div class="empty">Suhbat boshlang!</div>';
    return;
  }
  msgs.forEach(function(m) { addMsg(m.role, m.content, false); });
  scrollBot();
}

function addMsg(role, html, scroll) {
  var el  = document.getElementById('cmsg');
  var div = document.createElement('div');
  div.className = 'msg ' + (role === 'user' ? 'mu' : 'ma');
  div.innerHTML = fmtContent(html);
  var emp = el.querySelector('.empty');
  if (emp) emp.remove();
  el.appendChild(div);
  if (scroll !== false) scrollBot();
  return div;
}

function fmtContent(t) {
  if (!t) return '';
  var s = t.replace(/&lt;/g,'<').replace(/&gt;/g,'>').replace(/&amp;/g,'&');
  var ok = ['b','i','strong','em','code','pre','s','u'];
  s = s.replace(/<([a-zA-Z/][^>]*)>/g, function(m, tag) {
    var nm = tag.replace(/^\//, '').split(' ')[0].toLowerCase();
    return ok.indexOf(nm) !== -1 ? m : '';
  });
  return s;
}

async function sendMsg() {
  if (G.sending) return;
  var inp  = document.getElementById('cinp');
  var text = inp.value.trim();
  if (!text) return;

  G.sending = true;
  document.getElementById('csnd').disabled = true;
  inp.value = ''; inp.style.height = 'auto';

  addMsg('user', escH(text), true);
  var aiDiv = addMsg('assistant', '<div class="dots"><span></span><span></span><span></span></div>', true);

  try {
    var r = await fetch(G.api + '/api/chat', {
      method: 'POST',
      headers: { 'Authorization': 'Bearer ' + G.token, 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: text, sessionId: G.sessId || undefined })
    });
    var reader = r.body.getReader();
    var dec = new TextDecoder();
    var aiText = '';
    aiDiv.innerHTML = '';

    while (true) {
      var res = await reader.read();
      if (res.done) break;
      var lines = dec.decode(res.value).split('\n');
      for (var i = 0; i < lines.length; i++) {
        var line = lines[i];
        if (!line.startsWith('data:')) continue;
        try {
          var ev = JSON.parse(line.slice(5));
          if (ev.text) {
            aiText += ev.text;
            aiDiv.innerHTML = fmtContent(aiText);
            scrollBot();
          }
          if (ev.message) {
            aiDiv.innerHTML = '<i style="color:var(--hint)">' + escH(ev.message) + '</i>';
          }
        } catch(_) {}
      }
    }
  } catch(e) {
    aiDiv.innerHTML = '<i style="color:var(--hint)">Xato yuz berdi.</i>';
  }

  G.sending = false;
  document.getElementById('csnd').disabled = false;
}

async function startPpt() {
  var topic = (document.getElementById('w-topic').value || '').trim();
  if (!topic) { showToast('Mavzu kiriting'); return; }
  var desc  = (document.getElementById('w-desc').value || '').trim();

  var el = document.getElementById('pptv');
  el.innerHTML = '<div style="text-align:center;padding:40px"><div class="pring"></div><div class="sl" id="pmsg">AI kontent yozmoqda...</div></div>';

  try {
    var r = await fetch(G.api + '/api/ppt', {
      method: 'POST',
      headers: { 'Authorization': 'Bearer ' + G.token, 'Content-Type': 'application/json' },
      body: JSON.stringify({ topic: topic, slideCount: G.pptN, isPro: G.pptPro, description: desc })
    });
    var reader = r.body.getReader();
    var dec    = new TextDecoder();
    var result = null;

    while (true) {
      var res = await reader.read();
      if (res.done) break;
      var lines = dec.decode(res.value).split('\n');
      for (var i = 0; i < lines.length; i++) {
        var line = lines[i];
        if (!line.startsWith('data:')) continue;
        try {
          var ev = JSON.parse(line.slice(5));
          if (ev.message) { var pm = document.getElementById('pmsg'); if (pm) pm.textContent = ev.message; }
          if (ev.error)   { showToast(ev.message || 'Xato'); showPptWiz(); return; }
          if (ev.base64)  { result = ev; }
        } catch(_) {}
      }
    }

    if (result) {
      var blob = b64Blob(result.base64, 'application/vnd.openxmlformats-officedocument.presentationml.presentation');
      var url  = URL.createObjectURL(blob);
      var a    = document.createElement('a');
      a.href = url; a.download = result.fileName || 'presentation.pptx';
      document.body.appendChild(a); a.click(); document.body.removeChild(a);
      URL.revokeObjectURL(url);
      showToast('✅ Yuklab olindi!');
      loadPptList();
    }
  } catch(e) { showToast('Xato: ' + e.message); loadPptList(); }
}

function b64Blob(b64, type) {
  var bin = atob(b64), arr = new Uint8Array(bin.length);
  for (var i = 0; i < bin.length; i++) arr[i] = bin.charCodeAt(i);
  return new Blob([arr], { type: type });
}

  el.appendChild(stl);

  var sec = document.createElement('div'); sec.className = 'ss';
  var r1  = mkRow('✏️', 'rgba(46,134,171,.15)', 'Bot nomi', bs.botName || '');
  r1.addEventListener('click', function() {
    var n = prompt('Bot nomini kiriting:', bs.botName || '');
    if (!n || !n.trim()) return;
    apiFetch('/api/settings/bot', { method: 'PATCH', body: JSON.stringify({ botName: n.trim() }) })
      .then(function(d) { G.settBot.botName = d.botName; showToast('Saqlandi ✅'); showSettBot(); })
      .catch(function(e) { showToast(e.message); });
  });
  var r2 = mkRow('🎭', 'rgba(150,100,200,.15)', 'Uslub', pm[bs.personality] || '');
  r2.addEventListener('click', showStylePicker);
  var r3 = mkRow('🧬', 'rgba(200,150,50,.15)', 'Promptizatsiya', bs.extraInstructions ? 'Bor ✅' : 'Yo\'q');
  r3.addEventListener('click', function() {
    var t = prompt('Prompt (bo\'sh = o\'chirish):', bs.extraInstructions || '');
    if (t === null) return;
    apiFetch('/api/settings/bot', { method: 'PATCH', body: JSON.stringify({ extraInstructions: t.trim() }) })
      .then(function() { showToast('Saqlandi ✅'); showSettBot(); })
      .catch(function(e) { showToast(e.message); });
  });
  sec.appendChild(r1); sec.appendChild(r2); sec.appendChild(r3);
  el.appendChild(sec);

  var bk = document.createElement('button'); bk.className = 'bs'; bk.style.marginTop = '12px'; bk.textContent = '◀ Orqaga';
  bk.addEventListener('click', loadSett);
  el.appendChild(bk);
}

function showStylePicker() {
  var opts = [['Samimiy','friendly'],['Professional','professional'],['Quvnoq','funny'],['Qisqa va aniq','strict']];
  var ov   = document.createElement('div'); ov.className = 'mov on';
  var mdl  = document.createElement('div'); mdl.className = 'modal';
  var tl   = document.createElement('div'); tl.className = 'mtitle'; tl.textContent = 'Uslub tanlang';
  mdl.appendChild(tl);
  opts.forEach(function(o) {
    var btn = document.createElement('button'); btn.className = 'bs'; btn.style.marginBottom = '6px'; btn.textContent = o[0];
    btn.addEventListener('click', function() {
      ov.remove();
      apiFetch('/api/settings/bot', { method: 'PATCH', body: JSON.stringify({ personality: o[1] }) })
        .then(function(d) { G.settBot.personality = d.personality; showToast('Saqlandi ✅'); showSettBot(); })
        .catch(function(e) { showToast(e.message); });
    });
    mdl.appendChild(btn);
  });
  var cl = document.createElement('button'); cl.className = 'bs'; cl.textContent = 'Bekor';
  cl.addEventListener('click', function() { ov.remove(); });
  mdl.appendChild(cl);
  ov.appendChild(mdl);
  ov.addEventListener('click', function(e) { if (e.target === ov) ov.remove(); });
  document.body.appendChild(ov);
}

async function showSettIface() {
  var el = document.getElementById('settv');
  el.innerHTML = '<div class="ld"><div class="spin"></div></div>';
  try {
    var d   = await apiFetch('/api/settings/personas');
    var myP = d.personas || [];
    var blt = d.builtins  || [];
    el.innerHTML = '';

    var stl = document.createElement('div'); stl.className = 'stitle'; stl.textContent = '👤 Interfeys sozlamalari';
    el.appendChild(stl);

    // Modellar
    var stl2 = document.createElement('div'); stl2.className = 'stitle'; stl2.textContent = '🧠 Mening modellarim';
    el.appendChild(stl2);

    if (!myP.length) {
      var emp = document.createElement('div'); emp.style.cssText = 'color:var(--hint);font-size:13px;padding:6px 4px 10px'; emp.textContent = 'Hali model yo\'q';
      el.appendChild(emp);
    } else {
      myP.forEach(function(p) {
        var row = document.createElement('div'); row.className = 'pc';
        var em  = document.createElement('div'); em.className = 'pe'; em.textContent = p.emoji;
        var inf = document.createElement('div'); inf.className = 'pi';
        var nm  = document.createElement('div'); nm.className = 'pn'; nm.textContent = p.name;
        var dc  = document.createElement('div'); dc.className = 'pd'; dc.textContent = p.description || '';
        var dl  = document.createElement('button'); dl.className = 'pdel'; dl.textContent = '🗑';
        dl.addEventListener('click', function() { delPersona(String(p._id)); });
        inf.appendChild(nm); inf.appendChild(dc);
        row.appendChild(em); row.appendChild(inf); row.appendChild(dl);
        el.appendChild(row);
      });
    }

    var addBtn = document.createElement('button'); addBtn.className = 'bp'; addBtn.style.cssText = 'margin:6px 0 12px'; addBtn.textContent = '+ Yangi model';
    addBtn.addEventListener('click', function() { openModal('mod-pers'); });
    el.appendChild(addBtn);

    // Tayyor modellar
    var stl3 = document.createElement('div'); stl3.className = 'stitle'; stl3.textContent = '📋 Tayyor modellar';
    el.appendChild(stl3);

    blt.forEach(function(b) {
      var added = myP.some(function(p) { return p.name === b.name; });
      var row   = document.createElement('div'); row.className = 'pc';
      var em    = document.createElement('div'); em.className = 'pe'; em.textContent = b.emoji;
      var inf   = document.createElement('div'); inf.className = 'pi';
      var nm    = document.createElement('div'); nm.className = 'pn'; nm.textContent = b.name;
      var dc    = document.createElement('div'); dc.className = 'pd'; dc.textContent = b.desc;
      inf.appendChild(nm); inf.appendChild(dc); row.appendChild(em); row.appendChild(inf);
      if (added) {
        var sp = document.createElement('span'); sp.style.cssText = 'color:var(--hint);font-size:11px'; sp.textContent = 'Qo\'shilgan';
        row.appendChild(sp);
      } else {
        var ab = document.createElement('button'); ab.className = 'spb'; ab.textContent = '+';
        ab.addEventListener('click', function() { addBuiltin(b.key); });
        row.appendChild(ab);
      }
      el.appendChild(row);
    });

    // Tozalash
    var stl4 = document.createElement('div'); stl4.className = 'stitle'; stl4.style.marginTop = '14px'; stl4.textContent = '⚠️ Xavfli zona';
    el.appendChild(stl4);
    var clrBtn = document.createElement('button'); clrBtn.className = 'bd'; clrBtn.textContent = '🗑 Asosiy xotirani tozalash';
    clrBtn.addEventListener('click', clearMem);
    el.appendChild(clrBtn);

    var bk = document.createElement('button'); bk.className = 'bs'; bk.style.marginTop = '12px'; bk.textContent = '◀ Orqaga';
    bk.addEventListener('click', loadSett);
    el.appendChild(bk);

  } catch(e) { el.innerHTML = '<div class="empty">Yuklanmadi</div>'; }
}

async function doCreatePersona() {
  var emoji  = (document.getElementById('np-emoji').value.trim()   || '🤖');
  var name   = document.getElementById('np-name').value.trim();
  var desc   = document.getElementById('np-desc').value.trim();
  var prompt = document.getElementById('np-prompt').value.trim();
  if (!name || !prompt) { showToast('Nom va prompt kerak'); return; }
  try {
    await apiFetch('/api/settings/personas', { method: 'POST', body: JSON.stringify({ name: name, emoji: emoji, description: desc, systemPrompt: prompt }) });
    closeModal('mod-pers');
    showToast('Yaratildi ✅');
    showSettIface();
  } catch(e) { showToast(e.message); }
}

async function delPersona(id) {
  if (!confirm('O\'chirasizmi?')) return;
  try {
    await apiFetch('/api/settings/personas/' + id, { method: 'DELETE' });
    showToast('O\'chirildi');
    showSettIface();
  } catch(e) { showToast('Xato'); }
}

async function addBuiltin(key) {
  try {
    await apiFetch('/api/settings/personas', { method: 'POST', body: JSON.stringify({ builtinKey: key }) });
    showToast('Qo\'shildi ✅');
    showSettIface();
  } catch(e) { showToast(e.message); }
}

async function clearMem() {
  if (!confirm('Asosiy xotirani tozalash. Qaytarib bo\'lmaydi!')) return;
  try { await apiFetch('/api/settings/clear', { method: 'POST' }); showToast('Tozalandi ✅'); }
  catch(e) { showToast('Xato'); }
}

// ═══ YORDAMCHI ═══
function mkRow(icon, bg, lbl, val) {
  var row  = document.createElement('div'); row.className = 'sr';
  var ic   = document.createElement('div'); ic.className = 'sric'; ic.style.background = bg; ic.textContent = icon;
  var inf  = document.createElement('div'); inf.className = 'srinfo';
  var lb   = document.createElement('div'); lb.className  = 'srlbl'; lb.textContent = lbl;
  var vl   = document.createElement('div'); vl.className  = 'srval'; vl.textContent = val;
  var arr  = document.createElement('div'); arr.style.cssText = 'color:var(--hint);font-size:16px'; arr.textContent = '›';
  inf.appendChild(lb); inf.appendChild(vl);
  row.appendChild(ic); row.appendChild(inf); row.appendChild(arr);
  return row;
}

function showToast(msg, dur) {
  var e = document.getElementById('toast');
  e.textContent = msg; e.classList.add('on');
  setTimeout(function() { e.classList.remove('on'); }, dur || 2200);
}

function showErr(msg) {
  document.body.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100vh;color:var(--hint);text-align:center;padding:20px"><div><div style="font-size:40px;margin-bottom:12px">⚠️</div>' + msg + '</div></div>';
}

function escH(t) {
  return String(t || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function copyTxt(t) {
  if (navigator.clipboard) navigator.clipboard.writeText(t);
  showToast('Nusxalandi');
}

function cap(s) { return s ? s.charAt(0).toUpperCase() + s.slice(1) : ''; }
function pad(n) { return String(n).padStart(2, '0'); }

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js').catch(function() {});
}
</script>
