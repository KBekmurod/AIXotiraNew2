<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#1B2A4A">
<title>AI Yordamchi</title>
<link rel="manifest" href="/manifest.json">
<style>
:root{--bg:var(--tg-theme-bg-color,#0f1923);--bg2:var(--tg-theme-secondary-bg-color,#1a2633);--text:var(--tg-theme-text-color,#ffffff);--hint:var(--tg-theme-hint-color,#8899aa);--accent:#2E86AB;--radius:14px;--nav-h:62px;--hdr-h:54px;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;font-size:15px}
.hdr{position:fixed;top:0;left:0;right:0;height:var(--hdr-h);background:var(--bg2);display:flex;align-items:center;padding:0 16px;z-index:100;border-bottom:1px solid rgba(255,255,255,.06);gap:10px}
.hdr-title{font-size:16px;font-weight:600;flex:1}
.hdr-plan{font-size:11px;color:var(--hint);background:rgba(255,255,255,.08);padding:3px 9px;border-radius:20px}
.nav{position:fixed;bottom:0;left:0;right:0;height:var(--nav-h);background:var(--bg2);display:flex;border-top:1px solid rgba(255,255,255,.06);z-index:100}
.nb{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;cursor:pointer;color:var(--hint);border:none;background:none;font-size:9px;padding:5px 0;transition:color .18s}
.nb.on{color:var(--accent)}
.nb svg{width:21px;height:21px}
.page{position:fixed;top:var(--hdr-h);left:0;right:0;bottom:var(--nav-h);overflow-y:auto;display:none;flex-direction:column;-webkit-overflow-scrolling:touch}
.page.on{display:flex}
.chat-msgs{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:10px}
.msg{max-width:84%;padding:10px 13px;border-radius:var(--radius);line-height:1.55;word-break:break-word;font-size:14px}
.msg b,.msg strong{font-weight:600}.msg i,.msg em{font-style:italic}
.msg code{background:rgba(255,255,255,.12);padding:1px 5px;border-radius:4px;font-family:monospace;font-size:13px}
.msg pre{background:rgba(0,0,0,.35);padding:10px;border-radius:10px;overflow-x:auto;font-family:monospace;font-size:12px;margin:6px 0}
.msg pre code{background:none;padding:0}
.msg-u{background:var(--accent);color:#fff;align-self:flex-end;border-bottom-right-radius:4px}
.msg-a{background:var(--bg2);align-self:flex-start;border-bottom-left-radius:4px}
.dots{display:inline-flex;gap:3px;padding:4px 0}
.dots span{width:6px;height:6px;background:var(--hint);border-radius:50%;animation:bns .9s infinite}
.dots span:nth-child(2){animation-delay:.15s}.dots span:nth-child(3){animation-delay:.3s}
@keyframes bns{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-6px)}}
.sbar{display:flex;align-items:center;gap:8px;padding:7px 12px;background:rgba(46,134,171,.1);border-bottom:1px solid rgba(46,134,171,.18);font-size:12px;color:var(--accent);flex-shrink:0}
.sbar span{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sbar button{background:rgba(255,255,255,.07);border:none;color:var(--hint);cursor:pointer;font-size:11px;padding:3px 8px;border-radius:6px}
.chat-foot{padding:8px 12px;background:var(--bg2);border-top:1px solid rgba(255,255,255,.06);display:flex;gap:8px;align-items:flex-end;flex-shrink:0}
.chat-inp{flex:1;background:var(--bg);border:1px solid rgba(255,255,255,.1);border-radius:22px;padding:10px 16px;color:var(--text);font-size:14px;resize:none;max-height:120px;outline:none;line-height:1.4}
.chat-inp::placeholder{color:var(--hint)}
.csend{width:40px;height:40px;border-radius:50%;background:var(--accent);border:none;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:opacity .2s}
.csend:disabled{opacity:.4}
.lw{padding:12px;display:flex;flex-direction:column;gap:8px}
.card{background:var(--bg2);border-radius:var(--radius);padding:13px 15px;cursor:pointer;display:flex;align-items:center;gap:12px;border:1px solid rgba(255,255,255,.05);transition:background .15s}
.card:active{background:rgba(255,255,255,.06)}
.ci{width:38px;height:38px;border-radius:10px;background:rgba(46,134,171,.18);display:flex;align-items:center;justify-content:center;flex-shrink:0;color:var(--accent);font-size:18px}
.cinfo{flex:1;min-width:0}
.ctitle{font-size:14px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cmeta{font-size:11px;color:var(--hint);margin-top:2px}
.cdel{background:none;border:none;color:var(--hint);cursor:pointer;padding:6px;flex-shrink:0}
.fab{position:fixed;bottom:calc(var(--nav-h)+14px);right:16px;width:50px;height:50px;border-radius:50%;background:var(--accent);border:none;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 18px rgba(46,134,171,.45);z-index:50;transition:transform .15s}
.fab:active{transform:scale(.92)}
.sw{padding:16px;display:flex;flex-direction:column;gap:12px}
.plan-c{background:var(--bg2);border-radius:var(--radius);padding:18px;border:1px solid rgba(46,134,171,.25);text-align:center}
.plan-n{font-size:24px;font-weight:700;color:var(--accent)}.plan-s{font-size:12px;color:var(--hint);margin-top:4px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.sc{background:var(--bg2);border-radius:var(--radius);padding:14px;text-align:center;border:1px solid rgba(255,255,255,.05)}
.sv{font-size:26px;font-weight:700;color:var(--accent)}.sl{font-size:11px;color:var(--hint);margin-top:3px}
.lbar{height:4px;background:rgba(255,255,255,.1);border-radius:2px;overflow:hidden;margin-top:4px}
.lbar-f{height:100%;background:var(--accent);border-radius:2px;transition:width .5s}
.ss{background:var(--bg2);border-radius:var(--radius);overflow:hidden;border:1px solid rgba(255,255,255,.05);margin-bottom:10px}
.sr{display:flex;align-items:center;padding:13px 16px;gap:12px;border-bottom:1px solid rgba(255,255,255,.05);cursor:pointer}
.sr:last-child{border-bottom:none}.sr.nc{cursor:default}
.sicon{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:17px}
.sinfo{flex:1}.slbl{font-size:14px}.sval{font-size:12px;color:var(--hint);margin-top:2px}
.sarr{color:var(--hint);font-size:16px}
.stitle{font-size:12px;color:var(--hint);font-weight:600;text-transform:uppercase;letter-spacing:.04em;margin:14px 4px 6px;padding:0 4px}
.sub-plan{background:var(--bg2);border-radius:var(--radius);padding:14px 16px;border:1px solid rgba(255,255,255,.07);display:flex;align-items:center;gap:12px;margin-bottom:8px}
.sub-plan.cur{border-color:rgba(46,134,171,.4);background:rgba(46,134,171,.08)}
.spn{font-size:15px;font-weight:600}.spp{font-size:12px;color:var(--hint);margin-top:2px}
.spbtn{background:var(--accent);color:#fff;border:none;padding:8px 14px;border-radius:20px;font-size:13px;cursor:pointer}
.spbtn.cur{background:rgba(255,255,255,.08);color:var(--hint);cursor:default}
.wiz{padding:16px;display:flex;flex-direction:column;gap:14px}
.wlbl{font-size:13px;color:var(--hint);margin-bottom:4px}
.winp{width:100%;background:var(--bg2);border:1px solid rgba(255,255,255,.1);border-radius:10px;padding:12px 14px;color:var(--text);font-size:14px;outline:none}
.winp:focus{border-color:var(--accent)}
.wrow{display:flex;gap:8px;flex-wrap:wrap}
.wchip{padding:7px 14px;border-radius:20px;background:var(--bg2);border:1px solid rgba(255,255,255,.1);color:var(--text);cursor:pointer;font-size:13px;transition:all .15s}
.wchip.sel{background:var(--accent);border-color:var(--accent);color:#fff}
.pring{width:60px;height:60px;border:3px solid rgba(255,255,255,.1);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;margin:30px auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}
.pcard{background:var(--bg2);border-radius:var(--radius);padding:13px 15px;display:flex;align-items:center;gap:12px;border:1px solid rgba(255,255,255,.05);margin-bottom:8px}
.pemoji{width:38px;height:38px;border-radius:10px;background:rgba(46,134,171,.15);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.pinfo{flex:1;min-width:0}.pname{font-size:14px;font-weight:500}.pdesc{font-size:11px;color:var(--hint);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pdel{background:none;border:none;color:var(--hint);cursor:pointer;padding:6px}
.empty{text-align:center;padding:60px 20px;color:var(--hint);font-size:14px}
.empty svg{width:52px;height:52px;opacity:.25;display:block;margin:0 auto 12px}
.bp{background:var(--accent);color:#fff;border:none;padding:13px 20px;border-radius:22px;font-size:14px;cursor:pointer;font-weight:500;width:100%}
.bs{background:rgba(255,255,255,.07);color:var(--text);border:none;padding:12px 20px;border-radius:22px;font-size:14px;cursor:pointer;width:100%;margin-top:6px}
.bd{background:rgba(230,50,50,.15);color:#e05050;border:none;padding:12px 20px;border-radius:22px;font-size:14px;cursor:pointer;width:100%;margin-top:6px}
.ld{text-align:center;padding:40px;color:var(--hint)}
.spin{width:28px;height:28px;border:2px solid rgba(255,255,255,.1);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 10px}
.toast{position:fixed;bottom:calc(var(--nav-h)+16px);left:50%;transform:translateX(-50%);background:rgba(20,35,50,.97);color:#fff;padding:10px 18px;border-radius:22px;font-size:13px;z-index:999;white-space:nowrap;opacity:0;transition:opacity .22s;pointer-events:none}
.toast.on{opacity:1}
.mov{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:200;display:none;align-items:flex-end}
.mov.on{display:flex}
.modal{background:var(--bg2);border-radius:var(--radius) var(--radius) 0 0;padding:20px 16px 32px;width:100%;max-height:82vh;overflow-y:auto}
.modal-title{font-size:16px;font-weight:600;margin-bottom:16px;text-align:center}
.minp{width:100%;background:var(--bg);border:1px solid rgba(255,255,255,.12);border-radius:10px;padding:12px 14px;color:var(--text);font-size:14px;outline:none;margin-bottom:10px}
.minp:focus{border-color:var(--accent)}
.tab-bar{display:flex;border-bottom:1px solid rgba(255,255,255,.07)}
.tab{flex:1;padding:12px;background:none;border:none;border-bottom:2px solid transparent;color:var(--hint);font-size:13px;cursor:pointer;transition:all .18s}
.tab.on{color:var(--accent);border-bottom-color:var(--accent)}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-title" id="hdrTitle">AI Yordamchi</div>
  <div class="hdr-plan" id="hdrPlan">Free</div>
</div>

<!-- CHAT -->
<div class="page on" id="pg-chat">
  <div class="sbar" id="sbar" style="display:none">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/></svg>
    <span id="sbarTitle">Suhbat</span>
    <button onclick="exitSess()">&#x2715;</button>
  </div>
  <div class="chat-msgs" id="chatMsgs"></div>
  <div class="chat-foot">
    <textarea class="chat-inp" id="chatInp" placeholder="Xabar yozing..." rows="1"></textarea>
    <button class="csend" id="csend" onclick="sendMsg()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
    </button>
  </div>
</div>

<!-- FAYLLAR -->
<div class="page" id="pg-files">
  <div class="tab-bar">
    <button class="tab on" id="ftab-s" onclick="switchFTab('sessions')">&#x1F4AC; Suhbatlar</button>
    <button class="tab" id="ftab-p" onclick="switchFTab('ppts')">&#x1F3A8; PPT fayllar</button>
  </div>
  <div id="filesContent"></div>
  <button class="fab" id="filesFab" onclick="openNewSessModal()">&#x2B;</button>
</div>

<!-- PPT -->
<div class="page" id="pg-ppt">
  <div id="pptView"></div>
</div>

<!-- STATS -->
<div class="page" id="pg-stats">
  <div class="sw" id="statsView"></div>
</div>

<!-- YANGI -->
<div class="page" id="pg-news">
  <div class="lw" id="newsView"></div>
</div>

<!-- OBUNA -->
<div class="page" id="pg-sub">
  <div style="padding:16px" id="subView"></div>
</div>

<!-- SOZLAMALAR -->
<div class="page" id="pg-sett">
  <div style="padding:16px" id="settView"></div>
</div>

<!-- NAV -->
<nav class="nav">
  <button class="nb on" onclick="showPage('chat',this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>Chat
  </button>
  <button class="nb" onclick="showPage('files',this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"/></svg>Fayllar
  </button>
  <button class="nb" onclick="showPage('ppt',this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg>PPT
  </button>
  <button class="nb" onclick="showPage('stats',this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>Stats
  </button>
  <button class="nb" onclick="showPage('news',this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M4 22h16a2 2 0 002-2V4a2 2 0 00-2-2H4a2 2 0 00-2 2v16a2 2 0 002 2z"/><line x1="8" y1="6" x2="16" y2="6"/><line x1="8" y1="10" x2="16" y2="10"/></svg>Yangi
  </button>
  <button class="nb" onclick="showPage('sub',this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>Obuna
  </button>
  <button class="nb" onclick="showPage('sett',this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>Sozlama
  </button>
</nav>

<!-- MODAL: Yangi sessiya -->
<div class="mov" id="modNS" onclick="if(event.target===this)closeModal('modNS')">
  <div class="modal">
    <div class="modal-title">Yangi suhbat fayli</div>
    <input class="minp" id="nsTitle" placeholder="Sarlavha (ixtiyoriy)" maxlength="40">
    <button class="bp" onclick="doCreateSess()">Yaratish</button>
    <button class="bs" onclick="closeModal('modNS')">Bekor</button>
  </div>
</div>

<!-- MODAL: Yangi persona -->
<div class="mov" id="modNP" onclick="if(event.target===this)closeModal('modNP')">
  <div class="modal">
    <div class="modal-title">Yangi model</div>
    <div style="display:flex;gap:8px">
      <input class="minp" id="npEmoji" placeholder="&#x1F916;" maxlength="2" style="width:60px;flex-shrink:0">
      <input class="minp" id="npName" placeholder="Nom" maxlength="30" style="flex:1">
    </div>
    <input class="minp" id="npDesc" placeholder="Qisqa tavsif" maxlength="60">
    <textarea class="minp" id="npPrompt" placeholder="AI ga ko'rsatma..." rows="4" style="resize:none"></textarea>
    <button class="bp" onclick="doCreatePersona()">Saqlash</button>
    <button class="bs" onclick="closeModal('modNP')">Bekor</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
var G={api:location.origin,token:"",user:{},bot:{},isOwner:false,sessId:null,sesTitle:"",sending:false,newsPage:0,newsLoad:false,ftab:"sessions",pptWiz:{topic:"",n:5,pro:false,desc:""}};

window.addEventListener("DOMContentLoaded",async function(){
  var tg=window.Telegram&&window.Telegram.WebApp;
  if(tg){tg.ready();tg.expand();}
  var initData=tg&&tg.initData?tg.initData:"test";
  try{
    var r=await fetch(G.api+"/api/auth/verify",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({initData:initData})});
    var d=await r.json();
    if(!d.token){showErr("Kirish xatosi");return;}
    G.token=d.token;G.user=d.user;
  }catch(e){showErr("Server bilan aloqa yo'q");return;}
  try{
    var info=await apiFetch("/api/user/info");
    G.bot=info;G.isOwner=info.isOwner;
    document.getElementById("hdrTitle").textContent=info.botName||"AI Yordamchi";
    document.getElementById("hdrPlan").textContent=cap(info.plan||"free");
  }catch(e){}
  loadChat();
  var inp=document.getElementById("chatInp");
  inp.addEventListener("input",function(){this.style.height="auto";this.style.height=Math.min(this.scrollHeight,120)+"px";});
  inp.addEventListener("keydown",function(e){if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();sendMsg();}});
});

async function apiFetch(path,opts){
  opts=opts||{};
  opts.headers=Object.assign({"Authorization":"Bearer "+G.token,"Content-Type":"application/json"},opts.headers||{});
  var r=await fetch(G.api+path,opts);
  if(r.status===401){showToast("Sessiya tugadi");throw new Error("401");}
  var ct=r.headers.get("content-type")||"";
  if(!ct.includes("application/json"))throw new Error("Noto'g'ri javob");
  var d=await r.json();
  if(d.error)throw new Error(d.error);
  return d;
}

function showPage(name,btn){
  document.querySelectorAll(".page").forEach(function(p){p.classList.remove("on");});
  document.querySelectorAll(".nb").forEach(function(b){b.classList.remove("on");});
  document.getElementById("pg-"+name).classList.add("on");
  if(btn)btn.classList.add("on");
  if(name==="files")loadFiles();
  if(name==="ppt")loadPpt();
  if(name==="stats")loadStats();
  if(name==="news"){G.newsPage=0;loadNews();}
  if(name==="sub")loadSub();
  if(name==="sett")loadSett();
}

// ── CHAT ──
async function loadChat(){
  var el=document.getElementById("chatMsgs");
  el.innerHTML='<div class="ld"><div class="spin"></div></div>';
  try{
    var url="/api/chat"+(G.sessId?"?sessionId="+G.sessId:"");
    var d=await apiFetch(url);
    renderMsgs(d.messages||[]);
  }catch(e){el.innerHTML='<div class="empty">Yuklanmadi</div>';}
}
function renderMsgs(msgs){
  var el=document.getElementById("chatMsgs");
  if(!msgs.length){el.innerHTML='<div class="empty"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>Suhbat boshlang!</div>';return;}
  el.innerHTML="";
  msgs.forEach(function(m){addMsg(m.role,m.content,false);});
  sb();
}
function addMsg(role,html,scroll){
  var el=document.getElementById("chatMsgs");
  var d=document.createElement("div");
  d.className="msg "+(role==="user"?"msg-u":"msg-a");
  d.innerHTML=fmt(html);
  var emp=el.querySelector(".empty");if(emp)emp.remove();
  el.appendChild(d);if(scroll!==false)sb();return d;
}
function fmt(t){
  if(!t)return"";
  return t.replace(/&lt;/g,"<").replace(/&gt;/g,">").replace(/&amp;/g,"&").replace(/<(?!\/?(b|i|strong|em|code|pre|s|u)[ >])[^>]*>/g,"");
}
function sb(){var e=document.getElementById("chatMsgs");e.scrollTop=e.scrollHeight;}

async function sendMsg(){
  if(G.sending)return;
  var inp=document.getElementById("chatInp");
  var text=inp.value.trim();if(!text)return;
  G.sending=true;document.getElementById("csend").disabled=true;
  inp.value="";inp.style.height="auto";
  addMsg("user",escH(text),true);
